<!DOCTYPE html>
<html>
  <head>
    
      <link rel="stylesheet" href="style.css">
      <title>ROCK PAPER SCISSORS</title>
    
  
  </head>
  <body>
    <h class="heading">ROCK PAPER SCISSORS</h><br></br>
    <button class="button1" onclick="playgame('rock');"><img src="rock-emoji.png" class="move-icon"></button>


    <button class="button1" onclick="playgame('paper');"><img src="paper-emoji.png" class="move-icon"></button>
    


    <button class="button1" onclick="playgame('scissors');"><img src="scissors-emoji.png" class="move-icon"></button>

     <p class="js-result"></p>
     <p class="js-move"></p>
     <p class="js-score"></p>

    <button class="reset" onclick="
       score.Wins=0;
       score.Losses=0;
       score.Ties=0;
       //modify all the values when the reset button is hit
       localStorage.removeItem('score');

       document.querySelector('.js-score').innerHTML=`Wins :  ${score.Wins} , Losses : ${score.Losses} , Ties : ${score.Ties}`;  


      ">RESET SCORE</button>
     
    
    
    
    <script>

      let score=JSON.parse(localStorage.getItem('score'))||{
        Wins:0,
        Losses:0,
        Ties:0
      }
        document.querySelector('.js-score').innerHTML=`Wins :  ${score.Wins} , Losses : ${score.Losses} , Ties : ${score.Ties}`;


        document.querySelector('.js-move').innerHTML=`Computer move : ${computermove}. Your move : ${playermove}.`;

        document.querySelector('.js-result').innerHTML=`${result}`;
        

      /*
      if(score===null){
        score={
          Wins:0,
          Losses:0,
          Ties:0

        };
       }
      */
        
        function playgame(playermove){
          const computermove=pickcomputermove();
    
           let result='';
           if(playermove==='scissors'){
            if(computermove==='rock'){
              result='Computer wins';
            }else if(computermove==='paper'){
              result='You win';
            }else if(computermove==='scissors'){
              result="Tie";
            }
          }

           else if(playermove==='paper'){
            if(computermove==='rock'){
              result='You win';
            }else if(computermove==='paper'){
              result="Tie";
            }else if(computermove==='scissors'){
              result='Computer wins';
            }
          }

            else if(playermove==='rock'){
              if(computermove==='rock'){
                result="Tie";
              }else if(computermove==='paper'){
                result='Computer wins';
              }else if(computermove==='scissors'){
                result='You win';
              }
             
            }
              
            
            
            if(result==='You win'){
              score.Wins = score.Wins+ 1;

            }else if(result==='Computer wins'){
              score.Losses =score.Losses+ 1;
            }else if(result==="Tie"){
              score.Ties =score.Ties+ 1;
            }

            //storing in local storage
            localStorage.setItem('score',JSON.stringify(score));

             document.querySelector('.js-result').innerHTML= result;
             

             document.querySelector('.js-move').innerHTML= `You<img src="${playermove}-emoji.png" class="move-icon">
              <img src="${computermove}-emoji.png" class="move-icon">
              Computer`;


            document.querySelector('.js-score').innerHTML=`Wins :  ${score.Wins} , Losses : ${score.Losses} , Ties : ${score.Ties}`;


          
           
        }
          
          function pickcomputermove(){
              
              let computermove='';
              
              const randomnumber=Math.random()
          
              


                if(randomnumber>=0 && randomnumber<1/3){
                  computermove='rock';
                }else if(randomnumber>=1/3 && randomnumber<2/3){
                  computermove='paper'
                }else if(randomnumber>=2/3 && randomnumber<1){
                  computermove='scissors'
                }
                return computermove; ;

            
          
       }
    </script>
  </body>
</html>
